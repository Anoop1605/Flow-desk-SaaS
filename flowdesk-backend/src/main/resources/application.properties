# ===== FlowDesk Backend — Application Properties =====

spring.application.name=flowdesk-backend

# ── Database: PostgreSQL ──
# NOTE: Set your password via environment variable FLOWDESK_DB_PASSWORD.
spring.datasource.url=jdbc:postgresql://localhost:5432/flowdesk
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres123

# ── JPA / Hibernate ──
# Use 'update' for local dev so tables get created/updated automatically.
# If you are using SQL migrations and want strict schema checking, switch to 'validate'.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Server ──
server.port=8080

