# ===== FlowDesk Backend — Application Properties =====

spring.application.name=flowdesk-backend

# ── Database: PostgreSQL ──
# PostgreSQL password set to 'postgres'
spring.datasource.url=jdbc:postgresql://localhost:5432/flowdesk
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

# ── JPA / Hibernate ──
# Use 'update' for local dev so tables get created/updated automatically.
# If you are using SQL migrations and want strict schema checking, switch to 'validate'.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Server ──
server.port=8080

# ── Email Configuration (Optional - Invitations work without this) ──
# To enable real email invitations, uncomment and configure below:
# 
# Gmail Configuration (requires App Password, not regular password):
# Import the secret properties file (it is ignored by Git to keeping your password safe)
spring.config.import=optional:file:src/main/resources/application-secret.properties,optional:classpath:application-secret.properties

spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Use environment variables to keep your password out of the code!
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-16-letter-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# 
# Generic SMTP Configuration:
# spring.mail.host=your-smtp-server.com
# spring.mail.port=587
# spring.mail.username=your-email@domain.com
# spring.mail.password=your-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL for invitation links
app.frontend.url=http://localhost:5173

